name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Clone acpx-fork
        run: git clone https://github.com/openclaw/acpx.git acpx-fork --depth 1

      - name: Build acpx-fork
        run: cd acpx-fork && npm install && npm run build

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.1.38"

      - name: Install dependencies
        run: bun install

      - name: Typecheck
        run: bun run --filter frontend typecheck
        # TODO: Re-enable when @types/react / react-router type issues are resolved
        continue-on-error: true

      - name: Lint
        run: bun run lint
        # TODO: Re-enable lint when eslint.config.js is added (ESLint 9 requires flat config)
        continue-on-error: true

      - name: Build frontend
        run: bun run build:frontend

      - name: Build backend
        run: bun run build:backend

      - name: Run backend tests
        run: bun run --filter backend test --run

      - name: Run frontend tests
        run: bun run --filter frontend test --run
